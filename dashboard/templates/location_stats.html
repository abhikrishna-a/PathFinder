{% extends "base.html" %}
{% block title %}Location Stats — PathFinder{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Location Analytics</h2>
</div>

<div class="chart-container wide" style="padding: 28px;">
    <h3>Jobs by Location</h3>
    <div class="location-bars">
        {% for loc in location_data %}
        <div class="location-row">
            <div class="location-name">{{ loc.location|default:"Unknown" }}</div>
            <div class="location-bar-wrap">
                <div class="location-bar" style="width: {{ loc.pct }}%">
                    <span class="location-bar-pct">{{ loc.pct }}%</span>
                </div>
            </div>
            <div class="location-count">{{ loc.count }} ({{ loc.pct }}%)</div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
