{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PathFinder{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <div class="logo">P</div>
            PathFinder
            <span class="version-badge">v0.1.0</span>
        </div>
        <div class="nav-links">
            <a href="{% url 'overview' %}" class="{% if request.path == '/' %}active{% endif %}">Overview</a>
            <a href="{% url 'job_list' %}" class="{% if '/jobs/' in request.path %}active{% endif %}">Jobs</a>
            <a href="{% url 'application_list' %}" class="{% if '/applications/' in request.path %}active{% endif %}">Applications</a>
            <a href="{% url 'web_apply_list' %}" class="{% if '/web-apply/' in request.path %}active{% endif %}">Web Apply</a>
            <a href="{% url 'missing_emails' %}" class="{% if '/missing-emails/' in request.path %}active{% endif %}">Missing</a>
            <a href="{% url 'skill_stats' %}" class="{% if '/stats/skills' in request.path %}active{% endif %}">Skills</a>
            <a href="{% url 'company_stats' %}" class="{% if '/stats/companies' in request.path %}active{% endif %}">Companies</a>
            <a href="{% url 'location_stats' %}" class="{% if '/stats/locations' in request.path %}active{% endif %}">Locations</a>
            <a href="{% url 'profile' %}" class="{% if '/profile/' in request.path %}active{% endif %}">Profile</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        PathFinder &mdash; Open Source Job Portal &middot; <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    </footer>
    <script>
        // shared dropdown toggle
        function toggleDropdown(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const isOpen = el.classList.contains('open');
            closeAllDropdowns();
            if (!isOpen) el.classList.add('open');
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu.open').forEach(el => el.classList.remove('open'));
        }

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.filter-pill, .sort-pill')) {
                closeAllDropdowns();
            }
        });

        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
